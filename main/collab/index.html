        .form-group label { display: block; font-weight: 700; margin-bottom: 0.5rem; color: var(--text-primary); font-size: 0.95rem; }
        .form-control { width: 100%; padding: 0.75rem 1rem; font-family: var(--font-primary); font-size: 0.9rem; border: 1px solid var(--border-subtle); border-radius: 8px; background-color: var(--bg-body); color: var(--text-primary); outline: none; transition: all var(--transition-fast); }
        .form-control:focus { border-color: var(--clr-ochre); background-color: var(--bg-surface); box-shadow: 0 0 0 3px rgba(212, 154, 0, 0.1); }

        textarea.form-control { resize: vertical; min-height: 140px; }
        .submit-btn { width: 100%; padding: 0.85rem; background-color: var(--clr-ochre); color: #FFFFFF; font-weight: 700; font-size: 1rem; border-radius: 8px; transition: all var(--transition-fast); margin-top: 1rem; }

    <main class="page-content">
        <section class="form-section">
            <div class="container" style="display:flex; justify-content:center;">
                <div class="form-wrapper">
                    <h2 class="section-title" style="margin-bottom: 2.5rem;">درخواست هم‌کاری</h2>
                    <form action="https://your-worker.workers.dev/collab" method="POST">
                        <div class="form-group">
                            <label for="author_name">نام و نام‌خانوادگی</label>
                            <input type="text" id="author_name" name="author_name" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="contact_info">راه ارتباطی (ای‌میل یا آیدی تلگرام)</label>
                            <input type="text" id="contact_info" name="contact_info" class="form-control" style="direction: ltr;" placeholder="example@mail.com یا @username" required>
                        </div>
                        <div class="form-group">
                            <label for="work_type">نوع اثر</label>
                            <select id="work_type" name="work_type" class="form-control" required>
                                <option value="translation">ترجمه</option>
                                <option value="writing">تألیف</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="work_title">عنوان اثر</label>
                            <input type="text" id="work_title" name="work_title" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="summary">خلاصه‌ی اثر یا پاراگراف اول</label>
                            <textarea id="summary" name="summary" class="form-control" required></textarea>
                        </div>
                        <button type="submit" class="submit-btn">ارسال درخواست</button>
                    </form>
                </div>
            </div>
        </section>
    </main>
